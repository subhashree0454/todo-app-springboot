<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Todo - Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 600px; border-radius: 1rem;">
            <h2 class="mb-4">Edit Todo</h2>
            <form id="todoForm">
                <input type="hidden" id="todoId" th:value="${todoId}">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" id="title" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" id="description" rows="3"></textarea>
                </div>
                <div id="errorMessage" class="alert alert-danger d-none"></div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">Update Todo</button>
                    <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        const todoId = document.getElementById('todoId').value;

        // Load existing data
        async function loadTodo() {
            try {
                // We use the same get all API but filtered by ID? 
                // Or I should add a get by ID API. 
                // I'll add a get by ID API in the TodoController in next step if missing.
                // For now, I'll assume it exists.
                const response = await fetch(`/api/todos/${todoId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('title').value = result.data.title;
                    document.getElementById('description').value = result.data.description;
                }
            } catch (err) {
                console.error("Failed to load todo data", err);
            }
        }

        document.getElementById('todoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const response = await fetch(`/api/todos/${todoId}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, description })
                });

                const result = await response.json();
                if (result.success) {
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                errorDiv.textContent = "An error occurred. Please try again.";
                errorDiv.classList.remove('d-none');
            }
        });

        loadTodo();
    </script>
</body>
</html>
