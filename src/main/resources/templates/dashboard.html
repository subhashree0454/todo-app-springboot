<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">TodoMaster</a>
            <div class="ms-auto d-flex align-items-center">
                <span id="userName" class="me-3 fw-medium"></span>
                <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search todos by title...">
                    <button class="btn btn-primary" onclick="loadTodos(0)">Search</button>
                </div>
            </div>
            <div class="col-md-4 text-end">
                <a th:href="@{/todos/create}" class="btn btn-primary">Add New Todo</a>
            </div>
        </div>

        <div id="todoList" class="row">
            <!-- Todos will be loaded here -->
        </div>

        <nav aria-label="Page navigation" class="mt-4">
            <ul id="pagination" class="pagination justify-content-center">
                <!-- Pagination will be loaded here -->
            </ul>
        </nav>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        const user = JSON.parse(localStorage.getItem('user'));
        document.getElementById('userName').textContent = `Hello, ${user.name}`;

        async function loadTodos(page = 0) {
            const keyword = document.getElementById('searchInput').value;
            const url = `/api/todos?page=${page}&keyword=${keyword}`;

            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401 || response.status === 403) {
                    logout();
                    return;
                }

                const result = await response.json();
                if (result.success) {
                    renderTodos(result.data.content);
                    renderPagination(result.data);
                }
            } catch (err) {
                console.error("Failed to load todos", err);
            }
        }

        function renderTodos(todos) {
            const container = document.getElementById('todoList');
            if (todos.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-muted">No todos found. Start by adding one!</div>';
                return;
            }

            container.innerHTML = todos.map(todo => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card todo-card h-100 p-3">
                        <div class="d-flex justify-content-between">
                            <h5 class="card-title">${todo.title}</h5>
                            <span class="text-muted small">${new Date(todo.createdAt).toLocaleDateString()}</span>
                        </div>
                        <p class="card-text text-muted">${todo.description || 'No description'}</p>
                        <div class="mt-auto pt-3 d-flex gap-2">
                            <button onclick="editTodo(${todo.id})" class="btn btn-sm btn-outline-primary">Edit</button>
                            <button onclick="deleteTodo(${todo.id})" class="btn btn-sm btn-outline-danger">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderPagination(pageData) {
            const pagination = document.getElementById('pagination');
            let html = '';
            
            for (let i = 0; i < pageData.totalPages; i++) {
                html += `<li class="page-item ${i === pageData.number ? 'active' : ''}">
                    <button class="page-link" onclick="loadTodos(${i})">${i + 1}</button>
                </li>`;
            }
            pagination.innerHTML = html;
        }

        async function deleteTodo(id) {
            if (!confirm('Are you sure you want to delete this todo?')) return;

            try {
                const response = await fetch(`/api/todos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    loadTodos();
                }
            } catch (err) {
                alert("Failed to delete todo");
            }
        }

        function editTodo(id) {
            window.location.href = `/todos/edit/${id}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }

        loadTodos();
    </script>
</body>
</html>
